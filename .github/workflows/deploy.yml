name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages via l'artefact officiel.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule ceux en cours.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro (+ upload de l'artefact Pages)
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
